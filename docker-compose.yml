# ===========================================
# Docker Compose - Local Development Services
# ===========================================
#
# Usage:
#   - MinIO only:      docker-compose up -d
#   - Full localhost:   docker-compose --profile localhost up
#   - With PostgreSQL:  docker-compose --profile with-postgres up -d
#   - With MarkItDown:  docker-compose --profile with-markitdown up -d
#
# The "localhost" profile runs the full app (Node.js + Python/langextract)
# with source code mounted as a volume for live reloading.

services:
  # MinIO - Local S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: asap-kr-sync-minio
    # Credentials come from .env when set; the minioadmin default is fine for
    # a loopback-only dev service. Ports bind to 127.0.0.1 so the object store
    # (and any real manuscripts dropped into it) is not reachable from the LAN.
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Create default bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: asap-kr-sync-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    # `download` = anonymous read-only. The app itself uses credentialed,
    # presigned access; anonymous write/list is never needed, even in dev.
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb myminio/asap-kr-sync --ignore-existing;
      mc anonymous set download myminio/asap-kr-sync;
      exit 0;
      "

  # App - Full application (Node.js + Python/langextract)
  # Localhost mode: mounts source code for live reloading
  app:
    build: .
    container_name: asap-kr-sync-app
    # Dev override: image runs as non-root `app` (uid 999) by default for prod
    # security, but dev mounts host directories owned by the host user (uid
    # 1000) and tools like Vite write into them (e.g. .vite/ cache). Running
    # the dev container as root sidesteps the ownership mismatch — prod is
    # unaffected because it doesn't use this compose file.
    user: root
    ports:
      # Host port comes from APP_PORT (override in .env); container always
      # listens on 3000 internally. Vite dev server stays on 5173 in both
      # places — change VITE_HOST_PORT in .env if 5173 is also taken.
      - "${APP_PORT:-3000}:3000"
      - "${VITE_HOST_PORT:-5173}:5173"
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./migrations:/app/migrations
      - ./conf:/app/conf
      - ./seeders:/app/seeders
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL_DOCKER:-postgresql://postgres:postgres@host.docker.internal:5432/asap_krsync_dev}
    command: ["npm", "run", "dev"]
    depends_on:
      - minio
    profiles:
      - localhost

  # One-off script runner (e.g. detection prompt/example comparisons). Reuses
  # the app image but additionally mounts ./tmp so scratch inputs/outputs
  # persist to the host. Isolated under the `tools` profile with a `node`
  # entrypoint so it NEVER starts as part of the dev (`--profile localhost`) or
  # prod stack, and skips the DB-wait/migration entrypoint. Usage:
  #   docker compose --profile tools run --rm app-tools scripts/<script>.js [args]
  app-tools:
    build: .
    user: root
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./conf:/app/conf
      - ./tmp:/app/tmp
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=development
    entrypoint: ["node"]
    profiles:
      - tools

  # MarkItDown - Local PDF-to-Markdown conversion service
  markitdown:
    image: markitdown:latest
    container_name: asap-kr-sync-markitdown
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - with-markitdown

  # PostgreSQL - OPTIONAL (skip if you have your own)
  postgres:
    image: postgres:15-alpine
    container_name: asap-kr-sync-postgres
    # Loopback-only: publishing 5432 on 0.0.0.0 exposed a postgres/postgres
    # superuser to the whole LAN. Override the password via .env if desired.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: asap_krsync_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - with-postgres

volumes:
  postgres_data:
  minio_data:
